<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>SheShield — Delhi Safety Intelligence</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#08080f;--bg2:#0e0e18;--bg3:#141420;
--glass:rgba(10,10,18,0.82);--glass2:rgba(10,10,18,0.92);
--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
--text:#e8e8f0;--text2:#8a8aa4;--text3:#55556a;
--red:#ff2d55;--red-g:rgba(255,45,85,0.35);--red-dim:rgba(255,45,85,0.12);
--orange:#ff9f0a;--yellow:#ffd60a;--green:#30d158;--blue:#0a84ff;--purple:#bf5af2;
--font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
#map{position:absolute;inset:0;z-index:1;background:#08080f}
.leaflet-control-zoom{border:none!important;margin:12px!important}
.leaflet-control-zoom a{background:var(--glass2)!important;color:var(--text)!important;border:1px solid var(--border)!important;width:32px!important;height:32px!important;line-height:32px!important;font-size:16px!important;border-radius:8px!important;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.leaflet-control-zoom a:first-child{border-radius:8px 8px 0 0!important;margin-bottom:1px!important}
.leaflet-control-zoom a:last-child{border-radius:0 0 8px 8px!important}
.leaflet-control-zoom a:hover{background:rgba(255,255,255,0.1)!important}
.leaflet-control-attribution{display:none!important}

/* TOP BAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 16px;
background:linear-gradient(180deg,rgba(8,8,15,0.96) 0%,rgba(8,8,15,0.8) 60%,transparent 100%);pointer-events:none}
.topbar>*{pointer-events:auto}
.topbar-main{display:flex;align-items:center;gap:12px;padding:12px 0 8px;max-width:1400px;margin:0 auto}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;cursor:default}
.logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#ff2d55 0%,#ff6b8a 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px var(--red-g),0 2px 8px rgba(0,0,0,0.3)}
.logo-icon svg{width:18px;height:18px}
.logo-text{font-size:17px;font-weight:700;letter-spacing:-0.4px}
.logo-text span{color:var(--red)}
.search-wrap{flex:1;max-width:320px;position:relative}
.search-wrap input{width:100%;height:36px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;padding:0 12px 0 34px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:all 0.2s}
.search-wrap input:focus{border-color:rgba(255,255,255,0.18);background:rgba(255,255,255,0.09)}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3)}
.search-results{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--glass2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:12px;overflow:hidden;display:none;max-height:240px;overflow-y:auto}
.search-results.show{display:block}
.search-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background 0.15s;border-bottom:1px solid var(--border)}
.search-item:last-child{border:none}
.search-item:hover{background:rgba(255,255,255,0.05)}
.search-item-name{font-size:13px;font-weight:500}
.search-item-risk{font-family:var(--mono);font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px}

.controls-row{display:flex;gap:6px;flex-shrink:0;align-items:center}
.pill{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:all 0.2s;white-space:nowrap;user-select:none}
.pill.active{background:var(--red-dim);border-color:rgba(255,45,85,0.3);color:var(--red)}
.pill:hover:not(.active){border-color:var(--border2);color:var(--text)}

/* STATS ROW */
.stats-row{display:flex;gap:8px;padding:8px 0;max-width:1400px;margin:0 auto;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.stats-row::-webkit-scrollbar{display:none}
.stat-chip{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:10px;white-space:nowrap;flex-shrink:0}
.stat-num{font-family:var(--mono);font-size:14px;font-weight:600}
.stat-label{font-size:11px;color:var(--text2)}
.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}

/* FILTER CHIPS */
.filter-bar{display:flex;gap:5px;padding:4px 0 2px;max-width:1400px;margin:0 auto;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.f-chip{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text3);background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);white-space:nowrap;transition:all 0.2s;user-select:none;text-transform:uppercase;letter-spacing:0.4px}
.f-chip.active{color:var(--text);border-color:var(--border2);background:rgba(255,255,255,0.07)}

/* RIGHT PANEL */
.panel-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.4);opacity:0;pointer-events:none;transition:opacity 0.35s}
.panel-overlay.open{opacity:1;pointer-events:auto}
.panel{position:fixed;top:0;right:0;bottom:0;width:400px;z-index:2001;background:var(--bg2);border-left:1px solid var(--border);transform:translateX(100%);transition:transform 0.4s cubic-bezier(0.22,1,0.36,1);overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent}
.panel.open{transform:translateX(0)}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.panel-head{padding:24px 24px 0;display:flex;justify-content:space-between;align-items:flex-start}
.panel-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.2s;flex-shrink:0}
.panel-close:hover{border-color:var(--border2);color:var(--text);background:rgba(255,255,255,0.04)}
.area-name{font-size:24px;font-weight:700;letter-spacing:-0.5px;line-height:1.15}
.area-district{font-size:12px;color:var(--text2);margin-top:4px;font-weight:500}
.panel-content{padding:20px 24px 32px}

/* RISK METER */
.risk-section{margin:20px 0 24px}
.risk-track{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.risk-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(0.22,1,0.36,1)}
.risk-info{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.risk-num{font-family:var(--mono);font-size:28px;font-weight:700;letter-spacing:-1px}
.risk-badge{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px}

/* STAT CARDS */
.stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
.s-card{padding:14px 16px;background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:12px}
.s-card .val{font-family:var(--mono);font-size:20px;font-weight:700;letter-spacing:-0.5px}
.s-card .lbl{font-size:11px;color:var(--text2);margin-top:2px;font-weight:500}

/* SECTION */
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:14px}

/* CRIME BARS */
.crime-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.crime-name{font-size:12px;width:105px;flex-shrink:0;color:var(--text2);font-weight:500}
.crime-track{flex:1;height:5px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
.crime-fill{height:100%;border-radius:3px;transition:width 0.7s cubic-bezier(0.22,1,0.36,1)}
.crime-pct{font-family:var(--mono);font-size:11px;color:var(--text3);width:34px;text-align:right;flex-shrink:0;font-weight:500}

/* TIME CHART */
.time-grid{display:flex;align-items:flex-end;gap:8px;height:90px;padding:0 2px;margin-bottom:6px}
.t-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.t-bar{width:100%;border-radius:4px 4px 2px 2px;transition:height 0.6s cubic-bezier(0.22,1,0.36,1);min-height:3px;cursor:pointer;position:relative}
.t-bar:hover{filter:brightness(1.2)}
.t-bar::after{content:attr(data-v);position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:9px;color:var(--text2);opacity:0;transition:opacity 0.15s;pointer-events:none;font-weight:600}
.t-bar:hover::after{opacity:1}
.t-lbl{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:0.2px}

/* SAFE SPOTS */
.safe-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.safe-row:last-child{border:none}
.safe-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.safe-info{flex:1;min-width:0}
.safe-nm{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.safe-tp{font-size:10px;color:var(--text3);font-weight:500;text-transform:capitalize}
.safe-dst{font-family:var(--mono);font-size:11px;color:var(--text2);flex-shrink:0;font-weight:500}

/* SOS */
.sos{position:fixed;bottom:28px;right:28px;z-index:1500;width:62px;height:62px;border-radius:50%;border:none;background:linear-gradient(135deg,#ff2d55,#ff4f70);color:#fff;font-family:var(--font);font-size:11px;font-weight:800;letter-spacing:0.8px;cursor:pointer;display:flex;align-items:center;justify-content:center;animation:sos-p 2.2s ease-in-out infinite;transition:transform 0.15s;box-shadow:0 4px 20px var(--red-g)}
.sos:hover{transform:scale(1.08)}
.sos:active{transform:scale(0.94)}
@keyframes sos-p{0%,100%{box-shadow:0 0 0 0 var(--red-g),0 4px 20px var(--red-g)}50%{box-shadow:0 0 0 14px rgba(255,45,85,0),0 4px 24px var(--red-g)}}

/* SOS MODAL */
.sos-overlay{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
.sos-overlay.open{opacity:1;pointer-events:auto}
.sos-modal{background:var(--bg3);border:1px solid var(--border2);border-radius:24px;padding:32px 28px;width:min(360px,90vw);text-align:center;transform:scale(0.92) translateY(10px);transition:transform 0.35s cubic-bezier(0.22,1,0.36,1)}
.sos-overlay.open .sos-modal{transform:scale(1) translateY(0)}
.sos-modal h3{font-size:20px;font-weight:700;margin-bottom:4px}
.sos-modal p{font-size:12px;color:var(--text2);margin-bottom:24px}
.sos-btn-row{display:flex;flex-direction:column;gap:8px}
.sos-action{width:100%;padding:15px;border-radius:14px;border:none;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.sos-action:hover{opacity:0.88}
.sos-primary{background:var(--red);color:#fff}
.sos-secondary{background:rgba(255,255,255,0.05);color:var(--text);border:1px solid var(--border)}
.sos-green{background:rgba(48,209,88,0.12);color:var(--green);border:1px solid rgba(48,209,88,0.2)}
.sos-dismiss{margin-top:16px;background:none;border:none;color:var(--text3);font-family:var(--font);font-size:12px;cursor:pointer;padding:6px 12px;font-weight:500}

/* LEGEND */
.map-legend{position:fixed;bottom:28px;left:16px;z-index:1000;display:flex;flex-direction:column;gap:5px;background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:12px;padding:12px 16px}
.leg-row{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text2);font-weight:500}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* CUSTOM POPUP */
.leaflet-popup-content-wrapper{background:var(--glass2)!important;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border2)!important;border-radius:12px!important;box-shadow:0 8px 32px rgba(0,0,0,0.4)!important;color:var(--text)!important;padding:0!important}
.leaflet-popup-content{margin:12px 16px!important;font-family:var(--font)!important;font-size:13px!important}
.leaflet-popup-tip{background:var(--glass2)!important;border:1px solid var(--border)!important;box-shadow:none!important}
.leaflet-popup-close-button{color:var(--text2)!important;font-size:18px!important;padding:6px 8px!important}
.popup-name{font-weight:700;font-size:14px;margin-bottom:2px}
.popup-score{font-family:var(--mono);font-weight:700;font-size:13px}
.popup-link{font-size:11px;color:var(--blue);cursor:pointer;margin-top:4px;display:inline-block;font-weight:600}
.popup-link:hover{text-decoration:underline}

/* SAFE SPOT MARKERS */
.safe-marker-icon{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;border-radius:50%;border:2px solid;width:24px;height:24px;box-shadow:0 2px 8px rgba(0,0,0,0.4);transition:transform 0.15s}
.safe-marker-icon:hover{transform:scale(1.15)}

/* RESPONSIVE */
@media(max-width:768px){
  .panel{width:100%;height:70vh;top:auto;bottom:0;border-left:none;border-top:1px solid var(--border);border-radius:20px 20px 0 0;transform:translateY(100%)}
  .panel.open{transform:translateY(0)}
  .search-wrap{max-width:180px}
  .controls-row{display:none}
  .sos{bottom:20px;right:16px;width:54px;height:54px;font-size:10px}
  .map-legend{bottom:20px;left:12px;padding:8px 12px}
  .topbar{padding:0 12px}
}
@media(max-width:480px){
  .search-wrap{max-width:140px}
  .stat-label{font-size:10px}
  .logo-text{font-size:15px}
}
</style>
</head>
<body>

<div id="map"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-main">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="logo-text">She<span>Shield</span></div>
    </div>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Search area..." id="searchInput" autocomplete="off" spellcheck="false">
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="controls-row" id="timePills">
      <button class="pill active" data-time="all">All hours</button>
      <button class="pill" data-time="night">Night</button>
      <button class="pill" data-time="evening">Evening</button>
      <button class="pill" data-time="day">Daytime</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-chip"><div class="stat-dot" style="background:var(--red);box-shadow:0 0 6px var(--red-g)"></div><span class="stat-num">4,847</span><span class="stat-label">incidents</span></div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--orange)"></div><span class="stat-num">14</span><span class="stat-label">high-risk zones</span></div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--green)"></div><span class="stat-num">286</span><span class="stat-label">safe spots mapped</span></div>
    <div class="stat-chip"><div class="live-dot"></div><span class="stat-num" style="color:var(--green)">Live</span><span class="stat-label">synced</span></div>
  </div>
  <div class="filter-bar" id="filterBar">
    <button class="f-chip active" data-cat="all">All crimes</button>
    <button class="f-chip" data-cat="harassment">Harassment</button>
    <button class="f-chip" data-cat="assault">Sexual assault</button>
    <button class="f-chip" data-cat="stalking">Stalking</button>
    <button class="f-chip" data-cat="robbery">Robbery</button>
    <button class="f-chip" data-cat="kidnapping">Kidnapping</button>
  </div>
</div>

<!-- SIDE PANEL -->
<div class="panel-overlay" id="panelOverlay"></div>
<div class="panel" id="panel">
  <div class="panel-head">
    <div>
      <div class="area-name" id="pName">—</div>
      <div class="area-district" id="pDistrict">—</div>
    </div>
    <button class="panel-close" id="panelClose">&times;</button>
  </div>
  <div class="panel-content">
    <div class="risk-section">
      <div class="risk-track"><div class="risk-fill" id="rFill"></div></div>
      <div class="risk-info">
        <span class="risk-num" id="rNum">—</span>
        <span class="risk-badge" id="rBadge">—</span>
      </div>
    </div>
    <div class="stat-cards">
      <div class="s-card"><div class="val" id="pTotal">—</div><div class="lbl">Total cases (2yr)</div></div>
      <div class="s-card"><div class="val" id="pMonth">—</div><div class="lbl">This month</div></div>
      <div class="s-card"><div class="val" id="pPeak" style="color:var(--orange)">—</div><div class="lbl">Peak danger</div></div>
      <div class="s-card"><div class="val" id="pTrend">—</div><div class="lbl">vs last month</div></div>
    </div>
    <div style="margin-bottom:28px"><div class="sec-title">Crime breakdown</div><div id="crimeRows"></div></div>
    <div style="margin-bottom:28px"><div class="sec-title">Danger by time of day</div><div class="time-grid" id="timeGrid"></div></div>
    <div style="margin-bottom:28px"><div class="sec-title">Nearby safe spots</div><div id="safeList"></div></div>
    <button onclick="openSOS()" style="width:100%;padding:15px;border-radius:14px;border:2px solid var(--red);background:var(--red-dim);color:var(--red);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:0.3px">&#9888; Emergency — Call now</button>
  </div>
</div>

<!-- SOS -->
<button class="sos" onclick="openSOS()">SOS</button>
<div class="sos-overlay" id="sosOverlay">
  <div class="sos-modal">
    <h3>&#128680; Emergency</h3>
    <p>Tap to call immediately or share location</p>
    <div class="sos-btn-row">
      <button class="sos-action sos-primary">&#128222; Call 112 — Police</button>
      <button class="sos-action sos-secondary">&#128694; Women Helpline — 1091</button>
      <button class="sos-action sos-secondary">&#128222; DCW — 181</button>
      <button class="sos-action sos-green">&#128205; Share live location</button>
    </div>
    <button class="sos-dismiss" onclick="closeSOS()">Dismiss</button>
  </div>
</div>

<!-- LEGEND -->
<div class="map-legend">
  <div class="leg-row"><div class="leg-dot" style="background:#ffffb2;box-shadow:0 0 6px rgba(255,255,178,0.5)"></div>Extreme</div>
  <div class="leg-row"><div class="leg-dot" style="background:#fd8d3c"></div>High</div>
  <div class="leg-row"><div class="leg-dot" style="background:#e31a8c"></div>Moderate</div>
  <div class="leg-row"><div class="leg-dot" style="background:#7a0177"></div>Low</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
// ── MAP INIT ──
const map = L.map('map',{
  center:[28.6139,77.2090],
  zoom:12,
  minZoom:10,
  maxZoom:18,
  zoomControl:true,
  attributionControl:false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  subdomains:'abcd',maxZoom:19
}).addTo(map);

map.zoomControl.setPosition('bottomright');

// ── GENERATE HEATMAP DATA ──
function genHeatPoints(){
  const pts=[];
  areas.forEach(a=>{
    const count=Math.round(a.risk*2.5);
    const spread=a.risk>70?0.015:a.risk>40?0.012:0.008;
    for(let i=0;i<count;i++){
      const angle=Math.random()*Math.PI*2;
      const r=Math.random()*spread;
      const lat=a.lat+Math.sin(angle)*r;
      const lng=a.lng+Math.cos(angle)*r*(1/Math.cos(a.lat*Math.PI/180));
      const intensity=0.3+Math.random()*0.7*(a.risk/100);
      pts.push([lat,lng,intensity]);
    }
  });
  // corridor noise
  const corridors=[
    {from:[28.6448,77.2120],to:[28.6506,77.2301],n:40},
    {from:[28.6506,77.2301],to:[28.6770,77.2720],n:35},
    {from:[28.6730,77.2910],to:[28.6930,77.3120],n:30},
    {from:[28.7060,77.0690],to:[28.7280,77.1700],n:25},
    {from:[28.6519,77.1905],to:[28.6315,77.2167],n:20},
    {from:[28.5700,77.2430],to:[28.5310,77.2710],n:25},
  ];
  corridors.forEach(c=>{
    for(let i=0;i<c.n;i++){
      const t=Math.random();
      const lat=c.from[0]+(c.to[0]-c.from[0])*t+(Math.random()-0.5)*0.005;
      const lng=c.from[1]+(c.to[1]-c.from[1])*t+(Math.random()-0.5)*0.005;
      pts.push([lat,lng,0.2+Math.random()*0.4]);
    }
  });
  return pts;
}

// ── AREA CIRCLE MARKERS ──
const areaMarkers=[];
areas.forEach(a=>{
  let color,fillOp;
  if(a.risk>=75){color='#ff2d55';fillOp=0.18;}
  else if(a.risk>=50){color='#ff9f0a';fillOp=0.14;}
  else if(a.risk>=30){color='#ffd60a';fillOp=0.10;}
  else{color='#30d158';fillOp=0.08;}
  const radius=a.risk>70?Math.max(600,a.risk*9):a.risk>40?500:350;
  const circle=L.circle([a.lat,a.lng],{
    radius,color,fillColor:color,fillOpacity:fillOp,weight:1.5,opacity:0.4
  }).addTo(map);
  circle.on('click',()=>openPanel(a));
  circle.on('mouseover',function(){
    this.setStyle({fillOpacity:fillOp+0.15,weight:2.5,opacity:0.7});
  });
  circle.on('mouseout',function(){
    this.setStyle({fillOpacity:fillOp,weight:1.5,opacity:0.4});
  });
  circle.bindPopup(`<div class="popup-name">${a.name}</div><div style="color:var(--text2);font-size:11px;margin-bottom:4px">${a.district} District</div><div class="popup-score" style="color:${color}">Risk: ${a.risk}/100</div><div class="popup-link" onclick="openPanel(areas.find(x=>x.id===${a.id}))">View details →</div>`,{closeButton:true,className:''});
  areaMarkers.push({circle,area:a});
});

// ── PANEL LOGIC ──
const panelEl=document.getElementById('panel');
const overlayEl=document.getElementById('panelOverlay');

function openPanel(a){
  document.getElementById('pName').textContent=a.name;
  document.getElementById('pDistrict').textContent=a.district+' District';
  let color,label,bg;
  if(a.risk>=75){color='#ff2d55';label='Critical';bg='rgba(255,45,85,0.12)';}
  else if(a.risk>=50){color='#ff9f0a';label='High';bg='rgba(255,159,10,0.12)';}
  else if(a.risk>=30){color='#ffd60a';label='Moderate';bg='rgba(255,214,10,0.12)';}
  else{color='#30d158';label='Low';bg='rgba(48,209,88,0.12)';}
  const fill=document.getElementById('rFill');
  fill.style.width='0%';fill.style.background=color;
  setTimeout(()=>{fill.style.width=a.risk+'%';},80);
  const rn=document.getElementById('rNum');rn.textContent=a.risk+'/100';rn.style.color=color;
  const rb=document.getElementById('rBadge');rb.textContent=label;rb.style.background=bg;rb.style.color=color;
  document.getElementById('pTotal').textContent=a.total.toLocaleString();
  document.getElementById('pMonth').textContent=a.month;
  document.getElementById('pPeak').textContent=a.peak;
  const tr=document.getElementById('pTrend');tr.textContent=a.trend;
  tr.style.color=a.trend.startsWith('+')?'#ff2d55':'#30d158';

  // crimes
  const cDiv=document.getElementById('crimeRows');cDiv.innerHTML='';
  const crimeColors={"Harassment":"#ff2d55","Sexual assault":"#ff9f0a","Stalking":"#ffd60a","Robbery":"#0a84ff","Kidnapping":"#bf5af2","Other":"#55556a"};
  Object.entries(a.crimes).forEach(([k,v])=>{
    const row=document.createElement('div');row.className='crime-row';
    row.innerHTML=`<span class="crime-name">${k}</span><div class="crime-track"><div class="crime-fill" style="width:0%;background:${crimeColors[k]||'#55556a'}"></div></div><span class="crime-pct">${v}%</span>`;
    cDiv.appendChild(row);
    setTimeout(()=>{row.querySelector('.crime-fill').style.width=v+'%';},150);
  });

  // time
  const tDiv=document.getElementById('timeGrid');tDiv.innerHTML='';
  const tLabels=['6AM','12PM','6PM','9PM','12AM','3AM'];
  const maxT=Math.max(...a.times);
  a.times.forEach((v,i)=>{
    const col=document.createElement('div');col.className='t-col';
    let bc;if(v/maxT>=0.75)bc='#ff2d55';else if(v/maxT>=0.5)bc='#ff9f0a';else if(v/maxT>=0.3)bc='#ffd60a';else bc='#30d158';
    const h=Math.max(4,(v/maxT)*80);
    col.innerHTML=`<div class="t-bar" style="height:0px;background:${bc}" data-v="${v}"></div><div class="t-lbl">${tLabels[i]}</div>`;
    tDiv.appendChild(col);
    setTimeout(()=>{col.querySelector('.t-bar').style.height=h+'px';},200+i*60);
  });

  // safe spots nearby
  const sDiv=document.getElementById('safeList');sDiv.innerHTML='';
  const nearby=safeSpots.map(s=>{
    const d=Math.sqrt(Math.pow(s.lat-a.lat,2)+Math.pow(s.lng-a.lng,2))*111;
    return {...s,dist:d};
  }).sort((x,y)=>x.dist-y.dist).slice(0,5);
  nearby.forEach(s=>{
    let bg2,color2,letter;
    if(s.type==='metro'){bg2='rgba(48,209,88,0.1)';color2='#30d158';letter='M';}
    else if(s.type==='police'){bg2='rgba(10,132,255,0.1)';color2='#0a84ff';letter='P';}
    else{bg2='rgba(255,214,10,0.1)';color2='#ffd60a';letter='H';}
    const row=document.createElement('div');row.className='safe-row';
    row.innerHTML=`<div class="safe-ico" style="background:${bg2};color:${color2}">${letter}</div><div class="safe-info"><div class="safe-nm">${s.name}</div><div class="safe-tp">${s.type.replace('_',' ')}</div></div><div class="safe-dst">${s.dist.toFixed(1)} km</div>`;
    sDiv.appendChild(row);
  });

  panelEl.classList.add('open');
  overlayEl.classList.add('open');
  map.flyTo([a.lat,a.lng],14,{duration:0.8});
}

function closePanel(){
  panelEl.classList.remove('open');
  overlayEl.classList.remove('open');
  document.getElementById('rFill').style.width='0%';
}
document.getElementById('panelClose').addEventListener('click',closePanel);
overlayEl.addEventListener('click',closePanel);

// ── SEARCH ──
const searchInput=document.getElementById('searchInput');
const searchResults=document.getElementById('searchResults');
searchInput.addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  if(!q){searchResults.classList.remove('show');return;}
  const matches=areas.filter(a=>a.name.toLowerCase().includes(q)||a.district.toLowerCase().includes(q));
  if(!matches.length){searchResults.classList.remove('show');return;}
  searchResults.innerHTML='';
  matches.slice(0,8).forEach(a=>{
    let color;
    if(a.risk>=75)color='#ff2d55';else if(a.risk>=50)color='#ff9f0a';else if(a.risk>=30)color='#ffd60a';else color='#30d158';
    const el=document.createElement('div');el.className='search-item';
    el.innerHTML=`<span class="search-item-name">${a.name}<span style="color:var(--text3);font-weight:400;margin-left:6px;font-size:11px">${a.district}</span></span><span class="search-item-risk" style="background:${color}20;color:${color}">${a.risk}</span>`;
    el.addEventListener('click',()=>{
      openPanel(a);
      searchResults.classList.remove('show');
      searchInput.value='';
    });
    searchResults.appendChild(el);
  });
  searchResults.classList.add('show');
});
searchInput.addEventListener('blur',()=>{setTimeout(()=>searchResults.classList.remove('show'),200);});

// ── TIME PILLS ──
document.querySelectorAll('.pill').forEach(p=>{
  p.addEventListener('click',function(){
    document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    // Regenerate heatmap with different intensity for time filter effect
    const time=this.dataset.time;
    const newPts=[];
    const base=genHeatPoints();
    if(time==='all'){heatLayer.setLatLngs(base);return;}
    const multipliers={night:1.6,evening:1.2,day:0.5};
    const m=multipliers[time]||1;
    base.forEach(p=>{
      if(Math.random()<(time==='night'?0.9:time==='evening'?0.7:0.4)){
        newPts.push([p[0],p[1],p[2]*m]);
      }
    });
    heatLayer.setLatLngs(newPts);
  });
});

// ── FILTER CHIPS ──
document.querySelectorAll('.f-chip').forEach(c=>{
  c.addEventListener('click',function(){
    document.querySelectorAll('.f-chip').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
  });
});

function closeSOS(){document.getElementById('sosOverlay').classList.remove('open');}
document.getElementById('sosOverlay').addEventListener('click',function(e){
  if(e.target===this)closeSOS();
});
